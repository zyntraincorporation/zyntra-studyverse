<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZYNTRA — Study Tracker OS</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="description" content="Personal study accountability system for BUET admission prep" />
    <meta name="theme-color" content="#0a0e1a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ZYNTRA" />
    <script>
      window.addEventListener('error', function(e) {
        showErrorOverlay(e.message, e.filename + ':' + e.lineno, e.error ? e.error.stack : '');
      });
      window.addEventListener('unhandledrejection', function(e) {
        showErrorOverlay(e.reason ? e.reason.message || e.reason : 'Unhandled Promise Rejection', '', e.reason ? e.reason.stack : '');
      });
      function showErrorOverlay(message, source, stack) {
        if (document.getElementById('zyntra-error-overlay')) return;
        var div = document.createElement('div');
        div.id = 'zyntra-error-overlay';
        div.style.position = 'fixed';
        div.style.inset = '0';
        div.style.backgroundColor = '#0b0f19';
        div.style.color = '#f87171';
        div.style.padding = '30px';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '14px';
        div.style.zIndex = '999999';
        div.style.overflow = 'auto';
        div.style.lineHeight = '1.6';
        
        var html = '<h2 style="color: #ef4444; font-size: 20px; margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid #ef444433; padding-bottom: 10px;">🚨 ZYNTRA Application Crash</h2>';
        html += '<p><strong>Error:</strong> ' + message + '</p>';
        if (source) html += '<p><strong>Source:</strong> ' + source + '</p>';
        if (stack) html += '<pre style="background: #1e293b; color: #cbd5e1; padding: 15px; border-radius: 8px; overflow: auto; border: 1px solid #334155;">' + stack + '</pre>';
        
        html += '<div style="margin-top: 30px; padding: 15px; background: #0f172a; border-left: 4px solid #06b6d4; border-radius: 4px; color: #94a3b8;">';
        html += '<p style="margin: 0; font-weight: bold; color: #e2e8f0; margin-bottom: 5px;">💡 Troubleshooting Manual Deployment:</p>';
        html += '<ol style="margin: 5px 0 0 0; padding-left: 20px;">';
        html += '<li>Make sure you uploaded the <strong>client/dist</strong> folder contents, NOT the root folder or the <code>client</code> folder.</li>';
        html += '<li>Environment variables in the Netlify dashboard are only used when Netlify builds your site from GitHub. Since you uploaded manually, you must run <code>npm run build</code> locally first so Vite embeds your local <code>.env</code> file, then upload the <strong>client/dist</strong> folder.</li>';
        html += '</ol>';
        html += '</div>';
        
        div.innerHTML = html;
        document.body.appendChild(div);
      }
    </script>
  </head>
  <body class="bg-navy-900 text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
